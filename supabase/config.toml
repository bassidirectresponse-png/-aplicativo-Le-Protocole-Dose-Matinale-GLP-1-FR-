project_id = "pink_salt_burn_app"

[auth]
enabled = true
site_url = "https://pink-salt.netlify.app"
additional_redirect_urls = [
  "https://pink-salt.netlify.app",
  "https://pink-salt.netlify.app/**",
  "https://app.healthyandthin.online",
  "https://app.healthyandthin.online/**",
  "http://127.0.0.1:5173",
  "http://127.0.0.1:5173/**",
  "http://localhost:5173",
  "http://localhost:5173/**"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = false
