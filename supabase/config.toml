project_id = "pink_salt_burn_app"

[auth]
enabled = true
site_url = "https://pink-salt.netlify.app"
additional_redirect_urls = [
  "https://pink-salt.netlify.app",
  "https://pink-salt.netlify.app/**",
  "https://app.healthyandthin.online",
  "https://app.healthyandthin.online/**",
  "http://127.0.0.1:5173",
  "http://127.0.0.1:5173/**",
  "http://localhost:5173",
  "http://localhost:5173/**"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = false

# Webhook de livraison (appelé par n8n/vendepay, serveur-à-serveur).
# verify_jwt = false : le gateway ne peut pas valider de JWT ici (n8n n'en a pas).
# La protection est assurée DANS la fonction par N8N_DELIVERY_SECRET (fail-closed).
[functions.vendepay-register-access]
verify_jwt = false

# Envoi de notifications push : invoqué par l'admin connecté (JWT requis).
# verify_jwt = true : le gateway exige un JWT valide, puis la fonction vérifie
# que user.id == ADMIN_USER_ID (double contrôle d'autorisation).
[functions.send-push]
verify_jwt = true
